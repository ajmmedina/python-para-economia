unidad: 1
titulo: "Fundamentos de Python para Economía"
descripcion: "Introducción a la programación en Python con énfasis en aplicaciones económicas, cubriendo sintaxis, estructuras de control, funciones y manejo de archivos."
objetivo: "Que el estudiante adquiera las bases de la programación en Python, comprendiendo la sintaxis, estructuras de datos, control de flujo, funciones y manejo de archivos, aplicando estos conceptos en ejemplos prácticos relacionados con economía."