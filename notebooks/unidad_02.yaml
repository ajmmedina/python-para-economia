unidad: 2
titulo: "Visualización y análisis de datos" 
descripcion: "Exploración y representación gráfica de datos económicos utilizando librerías de visualización en Python para facilitar el análisis y la interpretación."
objetivo: "Que el estudiante desarrolle habilidades para visualizar y analizar datos económicos mediante gráficos básicos y avanzados, aplicando técnicas que faciliten la comprensión de patrones y tendencias."