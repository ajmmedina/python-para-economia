unidad: 3
titulo: "Programación orientada a objetos y bases de datos"
descripcion: "Introducción a la programación orientada a objetos y bases de datos con aplicaciones en economía, cubriendo conceptos, diseño y consultas SQL."
objetivo: "Que el estudiante comprenda y aplique los principios de la programación orientada a objetos y el manejo de bases de datos, desarrollando aplicaciones económicas prácticas y consultas SQL eficientes."